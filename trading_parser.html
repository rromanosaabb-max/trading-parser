<!DOCTYPE html>
<html lang="es">
<head>
<script>
// ─── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const picker = document.getElementById('tradeDate');
  if (picker) picker.value = new Date().toISOString().split('T')[0];
});

// ─── PARSER CORE ───────────────────────────────────────────────────────────────

function parseLog() {
  const raw = document.getElementById('logInput').value.trim();
  hideError();
  if (!raw) { showError('Pegá el log del broker primero.'); return; }

  const trades = extractTrades(raw);
  if (!trades.length) { showError('No se encontraron fills en el log. Verificá el formato.'); return; }

  renderResults(trades);
}

function extractTrades(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);

  // Collect all fills
  const fills = [];
  for (const line of lines) {
    const cols = line.split('\t');
    if (cols.length < 4) continue;

    const timeStr = cols[0].trim();
    const ticker = cols[1].trim();
    const event = cols[2].trim();
    const detail = cols[3].trim();

    // Capture stop loss orders
    if (['New Order Submitted', 'Order Placed', 'Modified'].includes(event) && ticker) {
      const stopMatch = detail.match(/(?:SHORT|SELL)\s+[\d,]+\s+\S+\s+at\s+STOP\s+of\s+([\d,.]+)/i);
      if (stopMatch) {
        const stopPrice = parseFloat(stopMatch[1].replace(',', '.'));
        const time = parseTime(timeStr);
        fills.push({ ticker, side: 'STOP_ORDER', shares: 0, price: stopPrice, time, raw: detail, isStop: true });
      }
      continue;
    }

    if (!['Filled', 'Partial Fill'].includes(event)) continue;
    if (!ticker) continue;

    // Parse: "Bought ALMU 7 @ 14,68" or "Sold ALMU 3 @ 15,23"
    const m = detail.match(/(Bought|Sold)\s+\S+\s+([\d,]+)\s+@\s+([\d,.]+)/i);
    if (!m) continue;

    const side = m[1].toLowerCase() === 'bought' ? 'BUY' : 'SELL';
    const shares = parseInt(m[2].replace(',', ''));
    const price = parseFloat(m[3].replace(',', '.'));
    const time = parseTime(timeStr);

    fills.push({ ticker, side, shares, price, time, raw: detail });
  }

  if (!fills.length) return [];

  // Group fills into trades: match BUY fills → SELL fills per ticker in order
  return buildTrades(fills);
}

function buildTrades(fills) {
  // Sort all fills by time globally
  const sorted = [...fills].sort((a, b) => a.time - b.time);

  // Group by ticker, then build positions: a position closes when net shares = 0
  const byTicker = {};
  for (const f of sorted) {
    if (!byTicker[f.ticker]) byTicker[f.ticker] = [];
    byTicker[f.ticker].push(f);
  }

  const positions = [];

  for (const [ticker, tickerFills] of Object.entries(byTicker)) {
    let netShares = 0;
    let currentPos = null;

    for (const fill of tickerFills) {
      // Detect direction: if first fill is SELL → SHORT, else LONG
      if (!currentPos) {
        const dir = fill.side === 'BUY' ? 'LONG' : 'SHORT';
        currentPos = {
          ticker,
          side: dir,
          entries: [],   // { shares, price, time }
          exits: [],     // { shares, price, time }
          pnl: 0,
        };
      }

      if (fill.isStop) {
        // Capture most recent stop price (overwrite if modified)
        currentPos.stopLoss = fill.price;
        continue;
      }

      if (fill.side === 'BUY') {
        netShares += fill.shares;
        if (currentPos.side === 'LONG') {
          currentPos.entries.push({ shares: fill.shares, price: fill.price, time: fill.time });
        } else {
          // SHORT cover
          currentPos.exits.push({ shares: fill.shares, price: fill.price, time: fill.time });
        }
      } else {
        netShares -= fill.shares;
        if (currentPos.side === 'LONG') {
          currentPos.exits.push({ shares: fill.shares, price: fill.price, time: fill.time });
        } else {
          // SHORT entry
          currentPos.entries.push({ shares: fill.shares, price: fill.price, time: fill.time });
        }
      }

      // When position reaches zero → close it
      if (netShares === 0) {
        // Calculate P&L
        let pnl = 0;
        const entryQ = currentPos.entries.map(e => ({ ...e, rem: e.shares }));
        const exitQ  = currentPos.exits.map(e => ({ ...e, rem: e.shares }));
        while (entryQ.length && exitQ.length) {
          const en = entryQ[0], ex = exitQ[0];
          const matched = Math.min(en.rem, ex.rem);
          pnl += currentPos.side === 'LONG'
            ? (ex.price - en.price) * matched
            : (en.price - ex.price) * matched;
          en.rem -= matched; ex.rem -= matched;
          if (en.rem <= 0) entryQ.shift();
          if (ex.rem <= 0) exitQ.shift();
        }
        currentPos.pnl = parseFloat(pnl.toFixed(2));

        // Avg entry/exit prices
        const totalEntryShares = currentPos.entries.reduce((s,e) => s + e.shares, 0);
        const totalExitShares  = currentPos.exits.reduce((s,e) => s + e.shares, 0);
        currentPos.avgEntry = currentPos.entries.reduce((s,e) => s + e.price * e.shares, 0) / totalEntryShares;
        currentPos.avgExit  = currentPos.exits.reduce((s,e) => s + e.price * e.shares, 0) / totalExitShares;
        currentPos.totalShares = totalEntryShares;
        currentPos.entryTime = formatTime(currentPos.entries[0].time);
        currentPos.exitTime  = formatTime(currentPos.exits[currentPos.exits.length - 1].time);

        // Compute R for each exit using stop loss
        if (currentPos.stopLoss && currentPos.avgEntry) {
          const risk = Math.abs(currentPos.avgEntry - currentPos.stopLoss);
          if (risk > 0) {
            currentPos.exits.forEach((ex, i) => {
              const reward = currentPos.side === 'LONG'
                ? ex.price - currentPos.avgEntry
                : currentPos.avgEntry - ex.price;
              ex.r = parseFloat((reward / risk).toFixed(2));
            });
          }
        }

        positions.push(currentPos);
        currentPos = null;
        netShares = 0;
      }
    }

    // If position never closed (end of day open) — still show it
    if (currentPos && (currentPos.entries.length || currentPos.exits.length)) {
      currentPos.pnl = 0;
      currentPos.avgEntry = currentPos.entries.length
        ? currentPos.entries.reduce((s,e) => s + e.price * e.shares, 0) / currentPos.entries.reduce((s,e) => s + e.shares, 0)
        : 0;
      currentPos.avgExit = 0;
      currentPos.totalShares = currentPos.entries.reduce((s,e) => s + e.shares, 0);
      currentPos.entryTime = formatTime(currentPos.entries[0]?.time || 0);
      currentPos.exitTime = '—';
      positions.push(currentPos);
    }
  }

  return positions;
}

function parseTime(str) {
  // "13/04/26 8:41:25 a. m." → timestamp
  try {
    const cleaned = str.replace('a. m.', 'AM').replace('p. m.', 'PM');
    const parts = cleaned.split(' ');
    const dateParts = parts[0].split('/');
    const timeParts = parts[1].split(':');
    const ampm = parts[2];
    let h = parseInt(timeParts[0]);
    const m = parseInt(timeParts[1]);
    const s = parseInt(timeParts[2]);
    if (ampm === 'PM' && h !== 12) h += 12;
    if (ampm === 'AM' && h === 12) h = 0;
    return new Date(2000 + parseInt(dateParts[2]), parseInt(dateParts[1])-1, parseInt(dateParts[0]), h, m, s).getTime();
  } catch(e) { return 0; }
}

function formatTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  const h = d.getHours().toString().padStart(2,'0');
  const m = d.getMinutes().toString().padStart(2,'0');
  return `${h}:${m}`;
}

// ─── RENDER ────────────────────────────────────────────────────────────────────

let parsedTrades = [];

function renderResults(trades) {
  parsedTrades = trades;

  const totalPL = trades.reduce((s, t) => s + t.pnl, 0);
  const wins = trades.filter(t => t.pnl > 0).length;
  const losses = trades.filter(t => t.pnl <= 0).length;
  const winRate = trades.length ? Math.round((wins / trades.length) * 100) : 0;
  const tickers = [...new Set(trades.map(t => t.ticker))];

  // Stats
  const plEl = document.getElementById('statPL');
  plEl.textContent = (totalPL >= 0 ? '+' : '') + '$' + totalPL.toFixed(2);
  plEl.className = 'value ' + (totalPL > 0 ? 'positive' : totalPL < 0 ? 'negative' : 'neutral');

  document.getElementById('statTrades').textContent = `${wins}W / ${losses}L`;
  document.getElementById('statWR').textContent = winRate + '%';
  document.getElementById('statTickers').textContent = tickers.join(', ');

  // Table — grouped by position
  const tbody = document.getElementById('tradesBody');
  tbody.innerHTML = '';
  trades.forEach((pos, i) => {
    const plSign = pos.pnl >= 0 ? '+' : '';
    const plClass = pos.pnl > 0 ? 'pl-pos' : pos.pnl < 0 ? 'pl-neg' : '';
    const sideClass = pos.side === 'SHORT' ? 'side-short' : 'side-long';

    // Build exits string: TP1, TP2, Stop...
    const exitsStr = pos.exits.map((ex, j) => {
      const label = pos.exits.length > 1 ? `TP${j+1}` : 'Exit';
      return `${label} ${ex.shares}sh @ $${ex.price.toFixed(2)}`;
    }).join('<br>');

    // Build entries string
    const entriesStr = pos.entries.map((en, j) => {
      const label = pos.entries.length > 1 ? `E${j+1}` : 'Entry';
      return `${label} ${en.shares}sh @ $${en.price.toFixed(2)}`;
    }).join('<br>');

    const stopStr = pos.stopLoss ? `$${pos.stopLoss.toFixed(2)}` : '—';
    const exitsWithR = pos.exits.map((ex, j) => {
      const label = pos.exits.length > 1 ? `TP${j+1}` : 'Exit';
      const rStr = ex.r !== undefined ? ` (${ex.r}R)` : '';
      return `${label} ${ex.shares}sh@$${ex.price.toFixed(2)}${rStr}`;
    }).join('<br>');

    tbody.innerHTML += `
      <tr>
        <td style="color:var(--muted)">${i+1}</td>
        <td><span class="ticker-badge">${pos.ticker}</span></td>
        <td><span class="side-badge ${sideClass}">${pos.side}</span></td>
        <td style="font-size:11px;line-height:1.8">${entriesStr}</td>
        <td style="font-size:11px;color:var(--loss)">${stopStr}</td>
        <td style="font-size:11px;line-height:1.8">${exitsWithR || '—'}</td>
        <td class="pl-value ${plClass}">${plSign}$${pos.pnl.toFixed(2)}</td>
        <td style="color:var(--muted)">${pos.entryTime}</td>
      </tr>`;
  });

  // Raw JSON
  document.getElementById('rawBox').textContent = JSON.stringify(buildNotionPayload(), null, 2);

  renderChart(trades);
  document.getElementById('results').style.display = 'block';
  document.getElementById('errorMsg').style.display = 'none';
}

// ─── NOTION PAYLOAD ────────────────────────────────────────────────────────────

function buildNotionPayload() {
  const trades = parsedTrades;
  const totalPL = trades.reduce((s, t) => s + t.pnl, 0);
  const wins = trades.filter(t => t.pnl > 0).length;
  const losses = trades.filter(t => t.pnl <= 0).length;
  const winRate = trades.length ? Math.round((wins / trades.length) * 100) : 0;
  const tickers = [...new Set(trades.map(t => t.ticker))];

  // Build trade detail as rich text
  let tradeText = trades.map((t,i) => {
    const entryStr = t.entries ? t.entries.map((e,j) => `E${j+1} ${e.shares}sh@$${e.price.toFixed(2)}`).join(' ') : `$${(t.avgEntry||0).toFixed(2)}`;
    const exitStr  = t.exits  ? t.exits.map((e,j)  => `TP${j+1} ${e.shares}sh@$${e.price.toFixed(2)}`).join(' ') : `$${(t.avgExit||0).toFixed(2)}`;
    return `[${i+1}] ${t.ticker} ${t.side} | ${entryStr} → ${exitStr} | P&L: ${t.pnl >= 0 ? '+' : ''}$${t.pnl.toFixed(2)}`;
  }).join('\n');

  const picker = document.getElementById('tradeDate');
  const today = picker && picker.value ? picker.value : new Date().toISOString().split('T')[0];

  return {
    parent: { database_id: "TU_DATABASE_ID" },
    properties: {
      "Fecha": { date: { start: today } },
      "P&L Total": { number: parseFloat(totalPL.toFixed(2)) },
      "Wins": { number: wins },
      "Losses": { number: losses },
      "Win Rate %": { number: winRate },
      "Nro Trades": { number: trades.length },
      "Tickers": { multi_select: tickers.map(t => ({ name: t })) }
    },
    children: [
      {
        object: "block",
        type: "heading_2",
        heading_2: { rich_text: [{ type: "text", text: { content: "Trades del día" } }] }
      },
      {
        object: "block",
        type: "code",
        code: {
          language: "plain text",
          rich_text: [{ type: "text", text: { content: tradeText } }]
        }
      },
      {
        object: "block",
        type: "heading_2",
        heading_2: { rich_text: [{ type: "text", text: { content: "Notas del día" } }] }
      },
      {
        object: "block",
        type: "paragraph",
        paragraph: { rich_text: [{ type: "text", text: { content: "" } }] }
      }
    ]
  };
}


// ─── NOTION PROXY ──────────────────────────────────────────────────────────────

async function notionFetch(endpoint, options) {
  const base = 'https://api.notion.com';
  // Try both corsproxy formats
  const proxies = [
    'https://corsproxy.io/?url=' + encodeURIComponent(base + endpoint),
    'https://corsproxy.io/?' + base + endpoint,
  ];
  
  for (const url of proxies) {
    try {
      const res = await fetch(url, options);
      // Accept any response (even 400/401) — means proxy worked
      if (res.status !== 0) return res;
    } catch(e) {
      continue;
    }
  }
  throw new Error('Proxy no disponible. Verificá tu conexión a internet.');
}

// ─── NOTION API ────────────────────────────────────────────────────────────────

async function sendToNotion() {
  const token = document.getElementById('notionToken').value.trim();
  const dbId = document.getElementById('notionDbId').value.trim();

  if (!token || !dbId) {
    setNotionStatus('Ingresá el token y el database ID.', 'error'); return;
  }
  if (!parsedTrades.length) {
    setNotionStatus('Parseá el log primero.', 'error'); return;
  }

  setNotionStatus('Enviando a Notion...', 'loading');

  const payload = buildNotionPayload();
  payload.parent.database_id = dbId;

  // Intentar con búsqueda de página existente para actualizar, sino crear nueva
  const picker = document.getElementById('tradeDate');
  const today = picker && picker.value ? picker.value : new Date().toISOString().split('T')[0];

  try {
    // Paso 1: buscar si ya existe una página para hoy
    const searchRes = await notionFetch('/v1/databases/' + dbId + '/query', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json',
        'Notion-Version': '2022-06-28'
      },
      body: JSON.stringify({
        filter: {
          property: 'Fecha',
          date: { equals: today }
        }
      })
    });

    const searchData = await searchRes.json();

    if (searchData.results && searchData.results.length > 0) {
      // Actualizar página existente
      const pageId = searchData.results[0].id;
      const updateRes = await notionFetch('/v1/pages/' + pageId, {
        method: 'PATCH',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json',
          'Notion-Version': '2022-06-28'
        },
        body: JSON.stringify({ properties: payload.properties })
      });
      const updateData = await updateRes.json();
      if (updateData.id) {
        setNotionStatus('✓ Página de hoy actualizada en Notion correctamente.', 'success');
      } else {
        setNotionStatus('Error al actualizar: ' + (updateData.message || 'desconocido'), 'error');
      }
    } else {
      // Crear página nueva
      const createRes = await notionFetch('/v1/pages', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json',
          'Notion-Version': '2022-06-28'
        },
        body: JSON.stringify(payload)
      });
      const createData = await createRes.json();
      if (createData.id) {
        setNotionStatus('✓ Página nueva creada en Notion correctamente.', 'success');
      } else {
        setNotionStatus('Error al crear: ' + (createData.message || 'desconocido'), 'error');
      }
    }
  } catch(err) {
    setNotionStatus('Error: ' + err.message, 'error');
  }
}

function setNotionStatus(msg, type) {
  const el = document.getElementById('notionStatus');
  el.textContent = msg;
  el.className = 'notion-status ' + type;
}

function copyJSON() {
  const json = document.getElementById('rawBox').textContent;
  if (!json) { alert('Parseá el log primero.'); return; }
  navigator.clipboard.writeText(json).then(() => {
    setNotionStatus('JSON copiado al portapapeles.', 'success');
  });
}

// ─── UI HELPERS ────────────────────────────────────────────────────────────────

function toggleRaw() {
  const box = document.getElementById('rawBox');
  const arrow = document.getElementById('rawArrow');
  const visible = box.style.display === 'block';
  box.style.display = visible ? 'none' : 'block';
  arrow.textContent = visible ? '▶' : '▼';
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}

function clearAll() {
  document.getElementById('logInput').value = '';
  document.getElementById('results').style.display = 'none';
  hideError();
  parsedTrades = [];
}


// ─── P&L CHART SVG ─────────────────────────────────────────────────────────────

function renderChart(trades) {
  const svg = document.getElementById('plChartSvg');
  if (!svg || !trades.length) return;

  const sorted = [...trades].sort((a,b) => (a.entryTime||'').localeCompare(b.entryTime||''));

  // Build cumulative points
  const points = [{ label: 'Start', val: 0 }];
  let cum = 0;
  sorted.forEach(t => {
    cum += t.pnl;
    points.push({ label: t.entryTime + ' ' + t.ticker, val: parseFloat(cum.toFixed(2)) });
  });

  const W = svg.parentElement.clientWidth - 32 || 600;
  const H = 200;
  const padL = 60, padR = 20, padT = 20, padB = 36;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  const vals = points.map(p => p.val);
  const minV = Math.min(...vals, 0);
  const maxV = Math.max(...vals, 0);
  const range = maxV - minV || 1;

  const xStep = chartW / (points.length - 1);
  const toX = i => padL + i * xStep;
  const toY = v => padT + chartH - ((v - minV) / range) * chartH;
  const zeroY = toY(0);

  const finalPL = vals[vals.length - 1];
  const lineColor = finalPL >= 0 ? '#4fd1a5' : '#f05a5a';
  const fillColor = finalPL >= 0 ? 'rgba(79,209,165,0.1)' : 'rgba(240,90,90,0.1)';

  // Build path
  const pathD = points.map((p,i) => `${i===0?'M':'L'}${toX(i).toFixed(1)},${toY(p.val).toFixed(1)}`).join(' ');
  const fillD = pathD + ` L${toX(points.length-1).toFixed(1)},${zeroY.toFixed(1)} L${toX(0).toFixed(1)},${zeroY.toFixed(1)} Z`;

  // Y axis labels
  const yTicks = [minV, 0, maxV].filter((v,i,a) => a.indexOf(v)===i);
  const yLabels = yTicks.map(v =>
    `<text x="${padL-8}" y="${toY(v)+4}" text-anchor="end" fill="#7a7a96" font-size="11" font-family="JetBrains Mono,monospace">${v>=0?'+':''}$${v.toFixed(2)}</text>`
  ).join('');

  // Zero line
  const zeroLine = `<line x1="${padL}" y1="${zeroY}" x2="${padL+chartW}" y2="${zeroY}" stroke="#2a2a35" stroke-width="1" stroke-dasharray="4,4"/>`;

  // X labels
  const xLabels = points.map((p,i) => {
    if (i === 0 || i === points.length-1 || points.length <= 5) {
      return `<text x="${toX(i)}" y="${H-8}" text-anchor="middle" fill="#7a7a96" font-size="10" font-family="JetBrains Mono,monospace">${p.label.split(' ')[0]}</text>`;
    }
    return '';
  }).join('');

  // Dots
  const dots = points.map((p,i) => {
    const c = p.val > 0 ? '#4fd1a5' : p.val < 0 ? '#f05a5a' : '#7a7a96';
    const tooltip = `${p.label}: ${p.val>=0?'+':''}$${p.val.toFixed(2)}`;
    return `<circle cx="${toX(i).toFixed(1)}" cy="${toY(p.val).toFixed(1)}" r="4" fill="${c}" stroke="var(--bg)" stroke-width="1.5"><title>${tooltip}</title></circle>`;
  }).join('');

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.innerHTML = `
    <path d="${fillD}" fill="${fillColor}" stroke="none"/>
    ${zeroLine}
    <path d="${pathD}" fill="none" stroke="${lineColor}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${yLabels}
    ${xLabels}
    ${dots}
  `;
}


// ─── SEND TO CHARTS ────────────────────────────────────────────────────────────

async function sendToCharts() {
  const token = document.getElementById('notionToken').value.trim();
  if (!token) { setNotionStatus('Ingresá el token primero.', 'error'); return; }
  if (!parsedTrades.length) { setNotionStatus('Parseá el log primero.', 'error'); return; }

  const picker = document.getElementById('tradeDate');
  const today = picker && picker.value ? picker.value : new Date().toISOString().split('T')[0];
  const chartsDbId = '0b17fb11-d47f-43c0-bb3d-100cb8fca502';

  setNotionStatus(`Creando ${parsedTrades.length} entradas en Charts...`, 'loading');

  let created = 0;
  let errors = 0;

  for (const pos of parsedTrades) {
    const resultado = pos.pnl > 0 ? 'Win' : pos.pnl < 0 ? 'Loss' : 'Break Even';
    const tp1 = pos.exits[0] || null;
    const tp2 = pos.exits[1] || null;

    const props = {
      "Nombre": pos.ticker,
      "date:Fecha:start": today,
      "date:Fecha:is_datetime": 0,
      "Resultado": resultado,
      "Tomado": "Si",
      "Lado": pos.side,
      "P&L": pos.pnl,
      "Entry Price": parseFloat(pos.avgEntry.toFixed(2)),
      "Shares": pos.totalShares,
    };

    if (pos.stopLoss) props["Stop Loss"] = pos.stopLoss;
    if (tp1) {
      props["TP1 Price"] = tp1.price;
      if (tp1.r !== undefined) props["TP1 R"] = tp1.r;
    }
    if (tp2) {
      props["TP2 Price"] = tp2.price;
      if (tp2.r !== undefined) props["TP2 R"] = tp2.r;
    }

    try {
      const res = await notionFetch('/v1/pages', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json',
          'Notion-Version': '2022-06-28'
        },
        body: JSON.stringify({
          parent: { database_id: chartsDbId },
          properties: {
            "Nombre": { title: [{ text: { content: pos.ticker } }] },
            "date:Fecha:start": undefined,
            "Fecha": { date: { start: today } },
            "Resultado": { select: { name: resultado } },
            "Tomado": { select: { name: "Si" } },
            "Lado": { select: { name: pos.side } },
            "P&L": { number: pos.pnl },
            "Entry Price": { number: parseFloat(pos.avgEntry.toFixed(2)) },
            "Shares": { number: pos.totalShares },
            ...(pos.stopLoss ? { "Stop Loss": { number: pos.stopLoss } } : {}),
            ...(tp1 ? { "TP1 Price": { number: tp1.price } } : {}),
            ...(tp1?.r !== undefined ? { "TP1 R": { number: tp1.r } } : {}),
            ...(tp2 ? { "TP2 Price": { number: tp2.price } } : {}),
            ...(tp2?.r !== undefined ? { "TP2 R": { number: tp2.r } } : {}),
          }
        })
      });
      const data = await res.json();
      if (data.id) created++;
      else errors++;
    } catch(e) {
      errors++;
    }
  }

  if (created > 0 && errors === 0) {
    setNotionStatus(`✓ ${created} entradas creadas en Charts. Ahora agregá el setup, calidad y captura en cada una.`, 'success');
  } else if (created > 0) {
    setNotionStatus(`${created} entradas creadas, ${errors} errores.`, 'success');
  } else {
    setNotionStatus('Error al crear entradas en Charts. Verificá la conexión de la integración.', 'error');
  }
}


// ─── COPY FOR NOTION ───────────────────────────────────────────────────────────

function copyForNotion() {
  if (!parsedTrades.length) { alert('Parseá el log primero.'); return; }

  const picker = document.getElementById('tradeDate');
  const dateStr = picker && picker.value ? picker.value : new Date().toISOString().split('T')[0];
  const totalPL = parsedTrades.reduce((s,t) => s + t.pnl, 0);
  const wins = parsedTrades.filter(t => t.pnl > 0).length;
  const losses = parsedTrades.filter(t => t.pnl <= 0).length;
  const winRate = parsedTrades.length ? Math.round((wins / parsedTrades.length) * 100) : 0;

  const lines = [];

  // Header
  lines.push('═══════════════════════════════════');
  lines.push(`TRADES DEL DÍA — ${dateStr}`);
  lines.push('═══════════════════════════════════');
  lines.push(`P&L Total: ${totalPL >= 0 ? '+' : ''}$${totalPL.toFixed(2)}  |  ${wins}W / ${losses}L  |  Win Rate: ${winRate}%`);
  lines.push('');

  // Separator line
  lines.push('───────────────────────────────────');

  // Each position
  parsedTrades.forEach((pos, i) => {
    const plSign = pos.pnl >= 0 ? '+' : '';
    const resultado = pos.pnl > 0 ? '✅ WIN' : pos.pnl < 0 ? '❌ LOSS' : '➖ BE';

    // Entry line
    const entryStr = pos.entries.length > 1
      ? pos.entries.map((e,j) => `E${j+1}: ${e.shares}sh @ $${e.price.toFixed(2)}`).join('  ')
      : `Entry: ${pos.entries[0]?.shares}sh @ $${pos.entries[0]?.price.toFixed(2)}`;

    // Stop
    const stopStr = pos.stopLoss ? `Stop: $${pos.stopLoss.toFixed(2)}` : 'Stop: —';

    // Exits with R
    const exitsStr = pos.exits.length > 1
      ? pos.exits.map((e,j) => {
          const rStr = e.r !== undefined ? ` (${e.r}R)` : '';
          return `TP${j+1}: ${e.shares}sh @ $${e.price.toFixed(2)}${rStr}`;
        }).join('  ')
      : pos.exits.length === 1
        ? `Exit: ${pos.exits[0].shares}sh @ $${pos.exits[0].price.toFixed(2)}${pos.exits[0].r !== undefined ? ` (${pos.exits[0].r}R)` : ''}`
        : 'Exit: —';

    lines.push(`#${i+1} ${pos.ticker} ${pos.side} — ${resultado} — ${plSign}$${pos.pnl.toFixed(2)}`);
    lines.push(`  ${entryStr}`);
    lines.push(`  ${stopStr}   ${exitsStr}`);
    lines.push(`  Hora: ${pos.entryTime}`);
    lines.push('───────────────────────────────────');
  });

  // Footer
  lines.push('');
  lines.push('[ Completar: Setup | Calidad | Errores | MFE | Captura ]');

  const text = lines.join('\n');

  navigator.clipboard.writeText(text).then(() => {
    setNotionStatus('✓ Copiado. Pegá con Ctrl+V en la página del día en Notion.', 'success');
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    setNotionStatus('✓ Copiado. Pegá con Ctrl+V en la página del día en Notion.', 'success');
  });
}
